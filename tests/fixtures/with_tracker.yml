name: with_tracker
description: Workflow with tracker configuration for testing

defaults:
  issue_number: "42"

tracker:
  type: custom
  issue: "{{issue_number}}"
  command: "echo '{{tracker_body}}' >> {{tracker_log}}"

steps:
  - id: step-a
    name: Step A
    type: bash
    target: "echo step-a"
    gate: auto

  - id: step-b
    name: Step B
    type: bash
    target: "echo step-b"
    gate: auto

  - id: step-no-track
    name: Step No Track
    type: bash
    target: "echo no-track"
    tracker: false
    gate: auto
