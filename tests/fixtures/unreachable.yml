name: unreachable
description: Workflow with an unreachable step

steps:
  - id: step-a
    name: Step A
    type: bash
    target: "echo a"
    gate: auto
    next: step-c

  - id: step-b
    name: Step B (unreachable)
    type: bash
    target: "echo b"
    gate: auto

  - id: step-c
    name: Step C
    type: bash
    target: "echo c"
    gate: auto
