name: with-foreach
description: Workflow with for_each iteration

defaults:
  stacks: "a,b,c"

steps:
  - id: iterate
    name: Iterate
    type: for_each
    over: "{{stacks}}"
    delimiter: ","
    item_var: current_stack
    max_iterations: 10
    step:
      id: process-one
      type: bash
      target: "echo {{current_stack}}"
    gate: auto

  - id: done
    name: Done
    type: bash
    target: "echo done"
    gate: auto
