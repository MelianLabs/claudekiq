id: bugfix
name: Bug Fix
description: Bug fix lifecycle — investigate, fix, validate, deploy
default_priority: high

steps:
  - id: read-story
    name: Read LT Story
    type: agent
    target: "@lt-story"
    args_template: "Read story {{story_id}}"
    gate: auto
    outputs: [story_title]

  - id: investigate
    name: Deep Bug Investigation
    type: skill
    target: "/bug-investigate"
    args_template: "{{story_id}}"
    gate: auto
    outputs: [root_cause, affected_files]

  - id: create-branch
    name: Create Branch
    type: agent
    target: "@lt-branch"
    args_template: "Create branch for story {{story_id}}"
    gate: auto
    outputs: [branch]

  - id: implement
    name: Implement Fix
    type: agent
    target: "@{{stack}}-feature"
    args_template: "Fix bug {{story_id}}: {{story_title}}. Root cause: {{root_cause}}"
    gate: human

  - id: run-tests
    name: Run Tests
    type: agent
    target: "@{{stack}}-test"
    gate: auto
    max_visits: 5
    on_pass: run-lint
    on_fail: fix-code

  - id: fix-code
    name: Fix Issues
    type: agent
    target: "@{{stack}}-feature"
    args_template: "Fix failing tests on {{branch}}"
    gate: auto
    next: run-tests

  - id: run-lint
    name: Run Linting
    type: agent
    target: "@{{stack}}-lint"
    gate: auto
    max_visits: 5
    on_pass: code-review
    on_fail: fix-lint

  - id: fix-lint
    name: Fix Lint Issues
    type: agent
    target: "@{{stack}}-lint"
    args_template: "--fix"
    gate: auto
    next: run-lint

  - id: code-review
    name: Code Review
    type: agent
    target: "@code-review"
    gate: review
    max_visits: 3
    on_pass: create-pr
    on_fail: implement

  - id: create-pr
    name: Create PR
    type: skill
    target: "/pre-pr"
    args_template: "{{story_id}}"
    gate: auto
    outputs: [pr_number]

  - id: full-review
    name: Full PR Review
    type: skill
    target: "/review"
    args_template: "{{pr_number}}"
    gate: human

  - id: staging-deploy
    name: Deploy to Staging
    type: skill
    target: "/staging-deploy"
    args_template: "{{pr_number}}"
    gate: human
    next: end
