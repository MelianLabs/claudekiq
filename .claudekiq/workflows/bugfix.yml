name: bugfix
description: Fix a bug or failing test in cq
default_priority: high

defaults:
  test_filter: ""

steps:
  - id: investigate
    name: Investigate Bug
    type: agent
    target: ""
    args_template: "Investigate bug: {{description}}. Read the relevant code in lib/*.sh, run tests with: bats tests/ to reproduce, and identify root cause."
    gate: human
    outputs: [root_cause, affected_files]

  - id: fix
    name: Implement Fix
    type: agent
    target: ""
    args_template: "Fix bug: {{description}}. Root cause: {{root_cause}}. Affected files: {{affected_files}}. Make minimal changes."
    gate: human

  - id: run-tests
    name: Run Tests
    type: bash
    target: "bats tests/"
    gate: review
    max_visits: 5
    on_pass: done
    on_fail: fix

  - id: done
    name: Commit Fix
    type: bash
    target: "git add -A && git commit -m 'Fix: {{description}}'"
    gate: human
    next: end
