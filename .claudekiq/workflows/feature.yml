name: feature
description: Add a new feature or command to cq
default_priority: normal

defaults:
  test_pattern: ""

steps:
  - id: plan
    name: Plan Implementation
    type: agent
    target: "@cq-dev"
    args_template: "Read technical_details.md and plan implementation for: {{description}}. Identify which lib files need changes and what tests to add."
    gate: human

  - id: create-branch
    name: Create Branch
    type: bash
    target: "git checkout -b feature/{{branch_name}} main"
    gate: auto

  - id: implement
    name: Implement Changes
    type: agent
    target: "@cq-dev"
    args_template: "Implement: {{description}}. Follow patterns in existing lib/*.sh files. Update lib/schema.sh if adding a command."
    gate: human

  - id: run-tests
    name: Run Tests
    type: bash
    target: "bats tests/"
    gate: review
    max_visits: 5
    on_pass: shellcheck
    on_fail: fix-code

  - id: fix-code
    name: Fix Failing Tests
    type: agent
    target: "@cq-dev"
    args_template: "Fix failing tests. Run: bats tests/ to see failures. Fix the code (not the tests) unless the tests are wrong."
    gate: auto
    next: run-tests

  - id: shellcheck
    name: Run ShellCheck
    type: bash
    target: "shellcheck cq lib/*.sh || true"
    gate: review
    max_visits: 3
    on_pass: write-tests
    on_fail: fix-lint

  - id: fix-lint
    name: Fix ShellCheck Issues
    type: agent
    target: "@cq-dev"
    args_template: "Fix shellcheck warnings in cq and lib/*.sh files."
    gate: auto
    next: shellcheck

  - id: write-tests
    name: Add/Update Tests
    type: agent
    target: "@cq-dev"
    args_template: "Ensure test coverage for: {{description}}. Add tests to the appropriate tests/test_*.bats file."
    gate: human

  - id: final-tests
    name: Final Test Run
    type: bash
    target: "bats tests/"
    gate: auto
    on_fail: fix-code

  - id: review
    name: Code Review
    type: manual
    description: "Review all changes for: {{description}}"
    gate: human

  - id: commit
    name: Commit Changes
    type: bash
    target: "git add -A && git commit -m '{{commit_message}}'"
    gate: human
    next: end
